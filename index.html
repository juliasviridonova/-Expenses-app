<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses-app</title>
    <link rel="icon" href="resources/expenses.avif" type="image" alt="Иконка приложения">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h1>Учет расходов</h1>
    <div class="expenses">
        <div class="expensesInput">
            <div class="moneyInput rub">
                <input class="moneyInput__input" type="number" min="1" id="expenseInput"/>
            </div>
            <select id="categorySelect" class="categorySelect">
                <option hidden disabled selected value="Категория">Категории</option>
                <option value="Продукты">Продукты</option>
                <option value="Кафе">Кафе и рестораны</option>
                <option>Квартира</option>
                <option>Авто</option>
            </select>
            
        </div>
        <button class="addButton" id="addButton">Добавить</button>

        <div class="stats">
            <div class="stats__limit">
                <span class="label">Лимит:</span>
                <span id="limitValue" class="rub">10000</span>
                <img 
                id="changeLimitBtn"
                class="stats__changeLimitBtn"
                src="./resourses/change.png" 
                alt="Смена лимита"/>
            </div>
            <div class="stats__total">
                <span class="label">Всего:</span>
                <span id="totalValue" class="rub">0</span>
            </div>
            <div class="stats__status">
                <span class="label">Статус</span>
                <span class="stats__statusText_positive" id="statusText">все хорошо</span>
            </div>
        </div>
        <div class="history">
            <div class="history__title label">История</div>
            <ol class="history__list" id="historyList"></ol>
        </div>
        <button class="clearButton" id="clearButton"> Сбросить расходы</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
